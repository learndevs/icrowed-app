[build]
  base = "."
  command = "npm install --no-save lightningcss-linux-x64-gnu && npm rebuild lightningcss --workspace=web && npm run build --workspace=web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[context.production]
  command = "npm install --no-save lightningcss-linux-x64-gnu && npm rebuild lightningcss --workspace=web && npm run build --workspace=web"

[context.deploy-preview]
  command = "npm install --no-save lightningcss-linux-x64-gnu && npm rebuild lightningcss --workspace=web && npm run build --workspace=web"
